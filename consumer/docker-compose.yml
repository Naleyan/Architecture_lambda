services:
  consumer:
    build: .
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    container_name: consumer_twitch
    restart: "always"
    networks:
      - network1
    volumes:
      - ./app:/consumer/app
      - ../data:/data
    command: python consumer.py
    environment:
      - PYTHONUNBUFFERED=1

networks:
  network1:
    name: mynetwork
    external: true


